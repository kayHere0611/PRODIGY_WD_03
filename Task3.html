<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Web Application</title>
    <style>
        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #1e3a8a;
            max-width: 100px;
        }
        .nav-container {
            margin: 50 auto;
            box-sizing: border-box;
            background-color: #66a6ff;
            position: fixed;
            top: 40px;
            left:0;
            width: 100%;
            padding: 20px ;
        }

        body { 
            padding-top: 75px; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f0f4f8;
        }
        .game-container { 
            text-align: center; 
        }
        .controls { 
            margin: 20px; 
            padding: 15px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        #status { 
            font-size: 24px; 
            margin-bottom: 10px; 
            font-weight: bold; 
        }
        
        #board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            width: 320px;
            height: 320px;
            background-color: transparent;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: white;
            border: 2px solid #66a6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .cell.x { color: #2e86de; }
        .cell.o { color: #7f0ed0; }

        #win-line-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 320px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #win-line { 
            stroke: #110dd58c; 
            stroke-width: 8; 
            stroke-linecap: round; 
        }
        button { 
            margin-top: 20px; 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #66a6ff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <a href="index.html" class="logo">
        <img src="logo.jpg" alt="Logo" style="height: 80px; vertical-align: middle;"> 
            Tic-Tac-Toe
        </a>
    </div>
    
    <div class="game-container">
        <div class="controls">
            <label><input type="radio" name="gameMode" value="duo" checked> 1v1 (Duo)</label>
            <label><input type="radio" name="gameMode" value="ai"> AI Mode(vs. Computer)</label>
        </div>

        <div id="status">Player X's Turn</div>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

            <svg id="win-line-svg">
                <line id="win-line" x1="0" y1="0" x2="0" y2="0" />
            </svg>
        </div>

        <button id="reset">Restart Game</button>
    </div>
    <script src="3jstask.js" defer></script>
</body>
</html>
